name: Build And Deploy

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/ai-content-backend
  CONTAINER_NAME: ai-content-backend
  APP_PORT: "8000"

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main')
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.workflow_run.head_sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,format=long

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && format('sha-{0}', github.sha) || format('sha-{0}', github.event.workflow_run.head_sha) }}
          CONTAINER_NAME: ${{ env.CONTAINER_NAME }}
          APP_PORT: ${{ env.APP_PORT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: ${{ secrets.EC2_PORT != '' && secrets.EC2_PORT || '22' }}
          envs: IMAGE_NAME,IMAGE_TAG,CONTAINER_NAME,APP_PORT
          script_stop: true
          script: |
            set -eu

            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker pull "${IMAGE_NAME}:${IMAGE_TAG}"

            docker rm -f "${CONTAINER_NAME}" || true

            docker run -d \
              --name "${CONTAINER_NAME}" \
              --restart unless-stopped \
              --env-file /opt/ai-content-detection/.env \
              -p "${APP_PORT}:8000" \
              "${IMAGE_NAME}:${IMAGE_TAG}"

            sleep 15
            curl --fail --silent http://127.0.0.1:${APP_PORT}/health > /tmp/ai-content-healthcheck.json
            cat /tmp/ai-content-healthcheck.json

            docker image prune -f
